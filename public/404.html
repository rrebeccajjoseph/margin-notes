<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect to index.html preserving the path as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
